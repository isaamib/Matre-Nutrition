<body>

	<nav>
		<a href="index.html"><img src="iconlogomatrelogin.png" alt="Logo da Loja" width="100px" height="50px"></a>
	</nav>

<div class="limiter">
    <div class="container-login100">
        <div class="wrap-login100">
            <form class="login100-form validate-form">
                <span class="login100-form-title p-b-26">
                    Cadastro
                </span>
                <span class="login100-form-title p-b-48">
                </span>

                <!-- Campo para o Nome -->
                <div class="wrap-input100 validate-input" data-validate="Nome é necessário">
                    <input class="input100" type="text" name="name" placeholder="Nome">
                </div>

                <!-- Campo para o Email -->
                <div class="wrap-input100 validate-input" data-validate="Email válido é: a@b.c">
                    <input class="input100" type="text" name="email" placeholder="Email">
                </div>

                <!-- Campo para a Senha -->
                <div class="wrap-input100 validate-input" data-validate="Digite a senha">
                    <span class="btn-show-pass">
                        <i class="zmdi zmdi-eye"></i>
                    </span>
                    <input class="input100" type="password" name="password" placeholder="Senha">
                </div>

                <!-- Campo para Confirmar Senha -->
                <div class="wrap-input100 validate-input" data-validate="Confirme a senha">
                    <span class="btn-show-pass">
                        <i class="zmdi zmdi-eye"></i>
                    </span>
                    <input class="input100" type="password" name="confirm_password" placeholder="Confirmar Senha">
                </div>

                <!-- Botão de Cadastro -->
                <div class="container-login100-form-btn">
                    <div class="wrap-login100-form-btn">
                        <div class="login100-form-bgbtn"></div>
                        <button class="login100-form-btn">
                            Cadastrar
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<div id="dropDownSelect1"></div>

<script src="js/main.js"></script>
